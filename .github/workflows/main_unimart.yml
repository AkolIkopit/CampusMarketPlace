name: Build and deploy Node.js app to Azure Web App - unimart

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"

      - run: npm install

      - name: Run tests with coverage
        continue-on-error: true
        run: |
          CI=true npm run test:coverage -- --runInBand --watchAll=false 2>&1 || true
          echo "=== Checking coverage output ==="
          if [ -f coverage/lcov.info ]; then
            echo "✓ coverage/lcov.info exists ($(wc -l < coverage/lcov.info) lines)"
          else
            echo "✗ coverage/lcov.info not found"
          fi

      - name: Verify lcov report exists
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "⚠️ coverage/lcov.info not found — Codecov upload will be skipped"
          else
            echo "coverage/lcov.info found ($(wc -l < coverage/lcov.info) lines)"
          fi

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - run: npm install

      - name: Build React app with PayFast sandbox config
        run: CI=false npm run build
        env:
          REACT_APP_PAYFAST_MODE: sandbox
          REACT_APP_PAYFAST_URL: https://sandbox.payfast.co.za/eng/process
          REACT_APP_PAYFAST_MERCHANT_ID: 10004002
          REACT_APP_PAYFAST_MERCHANT_KEY: q1cd2rdny4a53
          REACT_APP_PAYFAST_PASSPHRASE: payfast
          REACT_APP_PAYFAST_RETURN_URL: https://unimart-ekbjezg8fmfnhfes.austriaeast-01.azurewebsites.net/payment/success
          REACT_APP_PAYFAST_CANCEL_URL: https://unimart-ekbjezg8fmfnhfes.austriaeast-01.azurewebsites.net/payment/cancel
          REACT_APP_NOTIFY_URL: https://pjqoghabztvrywvwvfdp.supabase.co/functions/v1/payfast-notify

      - name: Verify PayFast values are baked into React build
        run: |
          echo "Checking generated React bundle..."

          if grep -R "YOUR_PRODUCTION_MERCHANT_ID" build/static/js; then
            echo "❌ Old PayFast placeholder still exists in build."
            exit 1
          else
            echo "✅ Old PayFast merchant placeholder not found."
          fi

          if grep -R "YOUR_PRODUCTION_MERCHANT_KEY" build/static/js; then
            echo "❌ Old PayFast merchant key placeholder still exists in build."
            exit 1
          else
            echo "✅ Old PayFast key placeholder not found."
          fi

          if grep -R "sandbox.payfast.co.za" build/static/js; then
            echo "✅ Sandbox PayFast URL found in build."
          else
            echo "❌ Sandbox PayFast URL not found in build."
            exit 1
          fi

          if grep -R "10004002" build/static/js; then
            echo "✅ Sandbox merchant ID found in build."
          else
            echo "❌ Sandbox merchant ID not found in build."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: node-app

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_53A8F320030C43338612B5D687168CE1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7C97BB6D76064C04842960EDE7AEE970 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D2542C92BDAC437CA18C0C5DCE856216 }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: "unimart"
          slot-name: "Production"
          package: .
