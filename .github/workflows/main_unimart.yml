name: Build and deploy Node.js app to Azure Web App - unimart

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"

      - run: npm install

      - name: Run tests with coverage
        continue-on-error: true
        run: |
          CI=true npm run test:coverage -- --runInBand --watchAll=false 2>&1 || true
          echo "=== Checking coverage output ==="
          if [ -f coverage/lcov.info ]; then
            echo "✓ coverage/lcov.info exists ($(wc -l < coverage/lcov.info) lines)"
          else
            echo "✗ coverage/lcov.info not found"
          fi

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - run: npm install

      - run: CI=false npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: node-app

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_53A8F320030C43338612B5D687168CE1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7C97BB6D76064C04842960EDE7AEE970 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D2542C92BDAC437CA18C0C5DCE856216 }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: "unimart"
          slot-name: "Production"
          package: .
